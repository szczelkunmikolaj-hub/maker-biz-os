<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1a26;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines subtle -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#2d9e82" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#2d9e82" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#2d9e82" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#2d9e82" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Logo mark -->
  <rect x="80" y="160" width="72" height="72" rx="16" fill="#2d9e82"/>
  <polygon points="116,172 140,184 116,196 92,184" fill="rgba(255,255,255,0.95)"/>
  <polygon points="92,184 116,196 116,220 92,208" fill="rgba(255,255,255,0.58)"/>
  <polygon points="140,184 116,196 116,220 140,208" fill="rgba(255,255,255,0.78)"/>
  <!-- App name -->
  <text x="172" y="205" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="52" fill="white">Maker Biz OS</text>
  <!-- Tagline -->
  <text x="80" y="290" font-family="system-ui, sans-serif" font-weight="400" font-size="28" fill="#94a3b8">3D Printing Business Manager</text>
  <!-- Divider -->
  <line x1="80" y1="330" x2="500" y2="330" stroke="#2d9e82" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Feature pills -->
  <rect x="80" y="360" width="220" height="44" rx="22" fill="#2d9e82" fill-opacity="0.15" stroke="#2d9e82" stroke-opacity="0.4" stroke-width="1"/>
  <text x="190" y="387" text-anchor="middle" font-family="system-ui" font-size="18" fill="#2d9e82">Project tracking</text>
  <rect x="316" y="360" width="200" height="44" rx="22" fill="#2d9e82" fill-opacity="0.15" stroke="#2d9e82" stroke-opacity="0.4" stroke-width="1"/>
  <text x="416" y="387" text-anchor="middle" font-family="system-ui" font-size="18" fill="#2d9e82">Profit margins</text>
  <rect x="532" y="360" width="200" height="44" rx="22" fill="#2d9e82" fill-opacity="0.15" stroke="#2d9e82" stroke-opacity="0.4" stroke-width="1"/>
  <text x="632" y="387" text-anchor="middle" font-family="system-ui" font-size="18" fill="#2d9e82">Filament costs</text>
  <!-- Right side mock stats -->
  <rect x="780" y="140" width="340" height="350" rx="16" fill="#1e2d40" stroke="#2d4a3e" stroke-width="1"/>
  <text x="950" y="188" text-anchor="middle" font-family="system-ui" font-size="14" fill="#64748b">THIS MONTH</text>
  <text x="860" y="240" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="36" fill="#2d9e82">€2,340</text>
  <text x="860" y="268" text-anchor="middle" font-family="system-ui" font-size="14" fill="#64748b">Revenue</text>
  <text x="1070" y="240" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="36" fill="white">71%</text>
  <text x="1070" y="268" text-anchor="middle" font-family="system-ui" font-size="14" fill="#64748b">Margin</text>
  <line x1="800" y1="295" x2="1100" y2="295" stroke="#2d4a3e" stroke-width="1"/>
  <!-- Mini bar chart -->
  <rect x="820" y="400" width="28" height="60" rx="4" fill="#2d9e82" fill-opacity="0.4"/>
  <rect x="858" y="375" width="28" height="85" rx="4" fill="#2d9e82" fill-opacity="0.6"/>
  <rect x="896" y="385" width="28" height="75" rx="4" fill="#2d9e82" fill-opacity="0.4"/>
  <rect x="934" y="355" width="28" height="105" rx="4" fill="#2d9e82"/>
  <rect x="972" y="370" width="28" height="90" rx="4" fill="#2d9e82" fill-opacity="0.6"/>
  <rect x="1010" y="360" width="28" height="100" rx="4" fill="#2d9e82" fill-opacity="0.8"/>
  <rect x="1048" y="340" width="28" height="120" rx="4" fill="#2d9e82"/>
